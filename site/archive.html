<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archive — Iowa Particles &amp; Plots Journal Club</title>
    <meta
      name="description"
      content="All past paper submissions from Iowa Particles &amp; Plots Journal Club, newest first."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Archive — Iowa Particles &amp; Plots Journal Club" />
    <meta property="og:description" content="All past paper submissions, grouped by week." />
    <meta property="og:url" content="https://meighenbergers.github.io/jc-ppi/archive.html" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-text">
          <span class="site-tag">jc-ppi</span>
          <h1>Iowa Particles &amp; Plots<br />Journal Club</h1>
          <p class="tagline">From arXiv to argument — every week.</p>
        </div>
      </div>
      <nav>
        <a href="./index.html">This Week</a>
        <a href="./archive.html" class="active">Archive</a>
        <a href="./stats.html">Stats</a>
        <a href="./resources.html">Resources</a>
        <a href="#" id="submit-link" target="_blank" rel="noopener">Submit a Paper ↗</a>
      </nav>
    </header>

    <main>
      <section class="week-header">
        <h2>Past Discussions</h2>
        <p class="week-label">All submissions from previous weeks, newest first.</p>
      </section>

      <div class="archive-search-wrap">
        <input
          id="archive-search"
          type="search"
          placeholder="Filter by title, author, keyword, submitter…"
          aria-label="Search archive"
        />
        <button id="discussed-filter" class="sf-btn" aria-pressed="false">
          &#9733; Discussed only
        </button>
      </div>

      <div id="subfield-filter-bar" class="subfield-filter-bar"></div>

      <div id="papers-container">
        <div class="loading">Loading archive…</div>
      </div>
    </main>

    <footer>
      <p>
        Iowa Particles &amp; Plots Journal Club &mdash;
        <a href="https://arxiv.org" target="_blank" rel="noopener">arXiv</a>
        &middot;
        <a href="https://inspirehep.net" target="_blank" rel="noopener">INSPIRE-HEP</a>
        &middot;
        <a href="https://github.com/MeighenBergerS/jc-ppi" target="_blank" rel="noopener">GitHub</a>
      </p>
    </footer>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
