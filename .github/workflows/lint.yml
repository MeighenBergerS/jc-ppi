name: Lint

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "README.md"
      - ".prettierrc"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "site/**"
      - "docs/**"
      - "README.md"
      - ".prettierrc"
      - ".github/workflows/lint.yml"

jobs:
  prettier:
    name: Prettier check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install --global prettier

      - name: Check formatting
        run: |
          prettier --check \
            "site/**/*.html" \
            "site/**/*.css" \
            "site/**/*.js" \
            "docs/**/*.md" \
            "README.md"
