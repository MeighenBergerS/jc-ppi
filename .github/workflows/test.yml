name: Tests

on:
  push:
    branches: [main]
    paths:
      - "site/assets/js/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "site/assets/js/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
